<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madina Smart Driver Pro</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffd700">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: sans-serif; overflow: hidden;}
        #map { height: 100vh; width: 100%; z-index: 1;}
        
        .action-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #ffd700;
            color: #000;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: max-content;
        }
        
        .spin-icon {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .top-buttons {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .small-btn {
            background: rgba(30, 30, 30, 0.9);
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .small-btn:active { background: #555; }

        .leaflet-popup-content { margin: 10px; text-align: center; font-size: 14px; font-weight: bold; }
        
        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        .nav-btn {
            padding: 8px 10px;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
        }
        .gmaps-btn { background: #00ffcc; }
        .waze-btn { background: #0099ff; color: white; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="top-buttons">
        <button class="small-btn" onclick="toggleMapStyle()">🗺️ Change Map View</button>
        <button class="small-btn" onclick="resetAPIKey()" style="color:#ff3366;">🔑 Reset API Key</button>
    </div>

    <button class="action-btn" onclick="scanNearby()">
        <span id="btn-icon">🔍</span> 
        <span id="btn-text">Scan Madina & Ask AI</span>
    </button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        // SECURE API KEY LOGIC
        let GEMINI_API_KEY = localStorage.getItem("nightspot_gemini_key");

        function getAPIKey() {
            if (!GEMINI_API_KEY) {
                GEMINI_API_KEY = prompt("First Time Setup: Enter your Google Gemini API Key.");
                if (GEMINI_API_KEY) {
                    localStorage.setItem("nightspot_gemini_key", GEMINI_API_KEY.trim());
                } else {
                    alert("App cannot work without the API Key!");
                }
            }
            return GEMINI_API_KEY;
        }

        function resetAPIKey() {
            localStorage.removeItem("nightspot_gemini_key");
            GEMINI_API_KEY = null;
            getAPIKey();
        }

        // Map Setup (Centered on MADINA)
        let isDarkMode = true;
        var map = L.map('map').setView([24.4672, 39.6112], 13);
        
        var darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
        var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        
        darkLayer.addTo(map);

        function toggleMapStyle() {
            if(isDarkMode) {
                map.removeLayer(darkLayer);
                satelliteLayer.addTo(map);
                isDarkMode = false;
            } else {
                map.removeLayer(satelliteLayer);
                darkLayer.addTo(map);
                isDarkMode = true;
            }
        }

        let driverLat, driverLon;
        let driverMarker; 
        let scanRadar; // Naya radar variable
        let markersLayer = L.layerGroup().addTo(map);
        let routeLineLayer = L.layerGroup().addTo(map);

        // Map Click or Auto GPS location set
        function updateDriverLocation(lat, lon) {
            driverLat = lat;
            driverLon = lon;
            
            if(driverMarker) map.removeLayer(driverMarker);
            if(scanRadar) map.removeLayer(scanRadar);
            routeLineLayer.clearLayers();

            // 1. Driver Dot
            driverMarker = L.circleMarker([lat, lon], {
                radius: 8, fillColor: "#0078ff", color: "#fff", weight: 2, fillOpacity: 1
            }).addTo(map);

            // 2. Scan Radar Ring (2.5km)
            scanRadar = L.circle([lat, lon], {
                radius: 2500, // 2.5km radar
                color: '#00ffcc',
                weight: 1,
                fillColor: '#00ffcc',
                fillOpacity: 0.05,
                dashArray: '5, 10'
            }).addTo(map);
        }

        map.on('click', function(e) {
            updateDriverLocation(e.latlng.lat, e.latlng.lng);
        });

        map.locate({setView: true, maxZoom: 13});
        map.on('locationfound', function(e) {
            if(!driverLat) { updateDriverLocation(e.latlng.lat, e.latlng.lng); }
        });

        // AI FUNCTION
        async function askGemini(placesList) {
            const apiKeyToUse = getAPIKey();
            if(!apiKeyToUse) return null;

            const now = new Date();
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const currentDay = days[now.getDay()]; 
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const currentTime = hours + ':' + minutes + ' ' + ampm; 

            const prompt = `Current local time in Madina is ${currentDay}, ${currentTime}. 
            I am a ride-hailing driver looking for passengers. 
            Here are nearby places within 2.5km:
            ${placesList}
            
            Select the SINGLE BEST place to wait. Choose a place where a car can safely wait outside or at the drop-off edge without getting stuck inside a building.
            Reply with ONLY the exact name of the place from the list.`;

            try {
                const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKeyToUse}`;
                const modelsRes = await fetch(modelsUrl);
                const modelsData = await modelsRes.json();
                
                if(modelsData.error) return null;

                const validModels = modelsData.models.filter(m => m.name.includes("gemini") && m.supportedGenerationMethods.includes("generateContent"));

                for (let model of validModels) {
                    const url = `https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${apiKeyToUse}`;
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    if(!data.error && data.candidates) {
                        return data.candidates[0].content.parts[0].text.trim();
                    }
                }
                return null;
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        // MAIN SCAN FUNCTION
        async function scanNearby() {
            if(!getAPIKey()) return;
            if(!driverLat || !driverLon) {
                alert("Pehle map par click kar ke location set karein!");
                return;
            }

            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');
            
            btnIcon.innerHTML = "⏳";
            btnIcon.classList.add("spin-icon");
            btnText.innerHTML = "Scanning Madina...";
            
            markersLayer.clearLayers();
            routeLineLayer.clearLayers();

            const scanRadius = 12000; 
            const query = `
                [out:json][timeout:25];
                (
                  node["aeroway"~"terminal"](around:${scanRadius},${driverLat},${driverLon});
                  node["railway"~"station"](around:${scanRadius},${driverLat},${driverLon});
                  node["amenity"~"hospital|place_of_worship"](around:${scanRadius},${driverLat},${driverLon});
                  node["tourism"~"hotel"](around:${scanRadius},${driverLat},${driverLon});
                  node["shop"~"mall|supermarket"](around:${scanRadius},${driverLat},${driverLon});
                );
                out center;
            `;

            const url = `https://lz4.overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if(data.elements.length === 0) {
                    alert("Koi ahem spot nahi mila.");
                    resetBtnUI();
                    return;
                }

                btnText.innerHTML = "AI is Thinking...";

                let placesNamesForAI = [];
                const driverLatLng = L.latLng(driverLat, driverLon);

                data.elements.forEach(place => {
                    const lat = place.lat || place.center.lat;
                    const lon = place.lon || place.center.lon;
                    let type = place.tags.amenity || place.tags.tourism || place.tags.aeroway || place.tags.railway || place.tags.shop || "Spot";
                    let name = place.tags.name || place.tags['name:en'] || type;
                    
                    const placeLatLng = L.latLng(lat, lon);
                    if(driverLatLng.distanceTo(placeLatLng) <= 2500) {
                        placesNamesForAI.push(`- ${name} (${type})`);
                    }
                });

                let bestPlaceName = null;
                if(placesNamesForAI.length > 0) {
                    bestPlaceName = await askGemini(placesNamesForAI.join("\n"));
                } else {
                    alert("Aapke 2.5km radar mein koi bara spot nahi hai. Thora aage drive karein.");
                }

                data.elements.forEach(place => {
                    const lat = place.lat || place.center.lat;
                    const lon = place.lon || place.center.lon;
                    const type = place.tags.amenity || place.tags.tourism || place.tags.aeroway || place.tags.railway || place.tags.shop || "Spot";
                    const name = place.tags.name || place.tags['name:en'] || type;
                    
                    let isBest = bestPlaceName && bestPlaceName.includes(name);

                    // Navigation Links (Google Maps & Waze)
                    const gmapsLink = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&dir_action=navigate`;
                    const wazeLink = `https://waze.com/ul?ll=${lat},${lon}&navigate=yes`;
                    
                    if(isBest) {
                        // 1. Safe Parking Radius (Green Circle)
                        L.circle([lat, lon], {
                            radius: 60, // 60 meters safe parking zone
                            color: '#32CD32', weight: 2, fillColor: '#32CD32', fillOpacity: 0.2
                        }).addTo(markersLayer);

                        // 2. Line from Driver to AI Spot
                        L.polyline([[driverLat, driverLon], [lat, lon]], {
                            color: '#ffd700', weight: 3, dashArray: '5, 10'
                        }).addTo(routeLineLayer);
                    }

                    let pinColor = isBest ? "#ffd700" : "#555"; 
                    let pinRadius = isBest ? 16 : 5;
                    let pinWeight = isBest ? 3 : 1;

                    const marker = L.circleMarker([lat, lon], {
                        radius: pinRadius, fillColor: pinColor, color: isBest ? "#000" : "#fff", weight: pinWeight, fillOpacity: 0.9
                    });

                    marker.bindPopup(`
                        <div>
                            ${isBest ? '⭐⭐ <b>AI BEST SPOT</b> ⭐⭐<br><span style="font-size:11px; color:#888;">(Park within the green zone)</span><br><br>' : ''}
                            <span style="font-size:15px; color:#000;">${name}</span><br>
                            
                            <div class="nav-buttons">
                                <a href="${gmapsLink}" target="_blank" class="nav-btn gmaps-btn">
                                    🚗 Google Maps
                                </a>
                                <a href="${wazeLink}" target="_blank" class="nav-btn waze-btn">
                                    🚙 Waze Navigation
                                </a>
                            </div>
                        </div>
                    `);
                    
                    markersLayer.addLayer(marker);
                    
                    if(isBest) {
                        setTimeout(() => marker.openPopup(), 600);
                    }
                });

                const group = new L.featureGroup(markersLayer.getLayers());
                map.fitBounds(group.getBounds().pad(0.1));

            } catch (error) {
                console.error(error);
                alert("Error: Internet issue.");
            }

            resetBtnUI();
        }

        function resetBtnUI() {
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');
            btnIcon.classList.remove("spin-icon");
            btnIcon.innerHTML = "🔍";
            btnText.innerHTML = "Scan Madina & Ask AI";
        }
    </script>
</body>
</html>
